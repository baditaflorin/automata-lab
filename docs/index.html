<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>automata-lab — Conway's Life, reaction-diffusion & Lenia</title>
    <meta
      name="description"
      content="Conway's Game of Life, Gray-Scott reaction-diffusion, and Lenia — mesmerizing cellular automata that run entirely in your browser. No backend, nothing leaves your device."
    />
    <script type="module" crossorigin src="./assets/index-B-y_TTPm.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BWE3ZkRS.css">
  </head>
  <body>
    <main class="stage">
      <canvas id="canvas"></canvas>
      <div class="hud" id="hud"></div>
    </main>

    <aside class="panel" id="panel">
      <header class="panel-head">
        <h1>automata<span>·</span>lab</h1>
        <button type="button" id="toggle-panel" class="ghost" aria-label="Hide controls">×</button>
      </header>

      <div class="seg" role="tablist" aria-label="Model">
        <button type="button" class="seg-btn" data-model="life" role="tab">Life</button>
        <button type="button" class="seg-btn" data-model="grayscott" role="tab">Reaction</button>
        <button type="button" class="seg-btn" data-model="lenia" role="tab">Lenia</button>
      </div>

      <div class="buttons transport">
        <button type="button" id="playpause" class="primary">⏸ Pause</button>
        <button type="button" id="step">⏭ Step</button>
      </div>

      <label class="row">
        <span>Speed <output id="speed-out"></output></span>
        <input type="range" id="speed" min="1" max="20" step="1" value="6" />
      </label>

      <!-- ============ Conway's Life controls ============ -->
      <section class="controls" data-for="life">
        <label class="row">
          <span>Density <output id="life-density-out"></output></span>
          <input type="range" id="life-density" min="0" max="0.9" step="0.01" value="0.3" />
        </label>
        <div class="buttons">
          <button type="button" id="life-random" class="primary">🎲 Randomize</button>
          <button type="button" id="life-clear">Clear</button>
        </div>
        <label class="row">
          <span>Stamp pattern</span>
          <select id="life-pattern">
            <option value="glider">Glider</option>
            <option value="blinker">Blinker</option>
            <option value="block">Block</option>
          </select>
        </label>
        <p class="hint">Tip: drag on the grid to draw cells.</p>
      </section>

      <!-- ============ Gray-Scott controls ============ -->
      <section class="controls" data-for="grayscott" hidden>
        <label class="row">
          <span>Preset</span>
          <select id="gs-preset">
            <option value="coral">Coral</option>
            <option value="mitosis">Mitosis</option>
            <option value="spots">Spots</option>
            <option value="stripes">Stripes</option>
          </select>
        </label>
        <label class="row">
          <span>Feed <output id="gs-feed-out"></output></span>
          <input type="range" id="gs-feed" min="0.01" max="0.09" step="0.0001" value="0.0545" />
        </label>
        <label class="row">
          <span>Kill <output id="gs-kill-out"></output></span>
          <input type="range" id="gs-kill" min="0.04" max="0.07" step="0.0001" value="0.062" />
        </label>
        <label class="row">
          <span>Diffuse A <output id="gs-da-out"></output></span>
          <input type="range" id="gs-da" min="0.4" max="1.2" step="0.01" value="1.0" />
        </label>
        <label class="row">
          <span>Diffuse B <output id="gs-db-out"></output></span>
          <input type="range" id="gs-db" min="0.2" max="0.7" step="0.01" value="0.5" />
        </label>
        <label class="row">
          <span>Colour</span>
          <select id="gs-ramp"></select>
        </label>
        <div class="buttons">
          <button type="button" id="gs-splat" class="primary">💧 Random splat</button>
          <button type="button" id="gs-clear">Clear</button>
        </div>
        <p class="hint">Tip: drag on the canvas to paint reagent.</p>
      </section>

      <!-- ============ Lenia controls ============ -->
      <section class="controls" data-for="lenia" hidden>
        <label class="row">
          <span>Growth μ <output id="le-mu-out"></output></span>
          <input type="range" id="le-mu" min="0.08" max="0.30" step="0.001" value="0.15" />
        </label>
        <label class="row">
          <span>Growth σ <output id="le-sigma-out"></output></span>
          <input type="range" id="le-sigma" min="0.008" max="0.04" step="0.001" value="0.017" />
        </label>
        <label class="row">
          <span>Time step <output id="le-dt-out"></output></span>
          <input type="range" id="le-dt" min="0.02" max="0.3" step="0.01" value="0.1" />
        </label>
        <label class="row">
          <span>Colour</span>
          <select id="le-ramp"></select>
        </label>
        <div class="buttons">
          <button type="button" id="le-orbium" class="primary">🛸 Orbium</button>
          <button type="button" id="le-soup">🎲 Soup</button>
          <button type="button" id="le-clear">Clear</button>
        </div>
        <p class="hint">Tip: drag on the canvas to paint life.</p>
      </section>

      <div class="buttons">
        <button type="button" id="png">⬇ PNG</button>
      </div>

      <footer class="self-ref">
        <a
          id="source"
          href="https://github.com/baditaflorin/automata-lab"
          target="_blank"
          rel="noopener"
          >source</a
        >
        ·
        <a href="https://www.paypal.com/paypalme/florinbadita" target="_blank" rel="noopener"
          >tip ♥</a
        >
        · <span id="version">vdev</span>
      </footer>
    </aside>

    <button type="button" id="show-panel" class="show-panel" aria-label="Show controls">⚙</button>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

  </body>
</html>
